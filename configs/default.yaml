# 默认配置文件
# 说明：
# 1. 这是“可直接运行”的默认模板，重点是把路径和流程说明清楚。
# 2. 真实全市场训练时，一般只需要改 paths、download 和少量 inference 字段。
# 3. 如果你已经有市场级 parquet，可直接设置 paths.reference_merged_parquet，跳过抓数阶段。

paths:
  # 单票原始 parquet 目录。download_stock.py 的默认输出位置。
  raw_daily_dir: data/daily

  # 合并后的市场级 parquet 文件。
  merged_parquet: data/market_daily.parquet

  # bundle 缓存目录。prepare 后会在这里生成 *.pt 和 summary.json。
  cache_dir: artifacts/cache

  # 模型落盘目录。
  models_dir: artifacts/models

  # 预测归档目录。每次 predict 或 daily 都会创建一个子目录。
  predictions_dir: artifacts/predictions

  # 历史验证目录。validate 会写入 history.csv。
  validation_dir: artifacts/validation

  # 全部命令默认日志目录。若 logging.write_file=true，会自动写 <command>.log。
  logs_dir: artifacts/logs

  # 训练和评估指标目录。
  metrics_dir: artifacts/metrics

  # 可选的外部市场级 parquet。
  # 如果本仓库内没有 merged_parquet，但这里指向了有效文件，
  # prepare/train/predict 会优先使用这个参考文件。
  reference_merged_parquet: null

logging:
  # 全局日志级别。所有 CLI 子命令和 daily 内部阶段都使用这一套级别。
  # 排查抓数或训练细节时可切到 DEBUG。
  level: INFO

  # 是否同时输出到终端。
  console: true

  # 是否默认写入 paths.logs_dir/<command>.log。
  # 例如 download.log / train.log / predict.log / daily.log。
  write_file: true

  # 可选的统一日志文件。
  # null 表示按命令自动分文件；若设成具体路径，则该次命令的所有主流程日志都写这个文件。
  log_file: null

download:
  # 下载起始日期。第一次抓全量时会用到。
  start_date: "1990-01-01"

  # 下载终止日期。null 表示自动使用最近交易日。
  end_date: null

  # 复权方式：none / qfq / hfq。
  adjust: hfq

  # 是否继承 shell 中的 http_proxy / https_proxy 环境变量。
  use_env_proxy: false

  # 是否在抓数前用系统 Chrome/Chromium 预热最小 Eastmoney Cookie。
  eastmoney_cookie_warmup: false

  # 预热得到的最小 Cookie 缓存文件。
  eastmoney_cookie_cache_file: artifacts/cache/eastmoney_cookie.json

  # Cookie 缓存可复用的最长秒数。
  eastmoney_cookie_max_age_seconds: 21600

  # 运行 Cookie 预热器的 Node.js 路径。
  eastmoney_cookie_node_binary: node

  # Eastmoney Cookie 预热脚本路径。
  eastmoney_cookie_script: tools/eastmoney_cookie_warmer.mjs

  # 可选：系统 Chrome/Chromium 可执行文件路径。
  eastmoney_browser_path: null

  # 可选：传给 Chrome/Chromium 的代理地址。
  eastmoney_browser_proxy: null

  # Cookie 预热超时时间，单位毫秒。
  eastmoney_cookie_timeout_ms: 15000

  # 是否启用巨量动态代理提取。
  juliang_enabled: true

  # 可选：巨量订单业务编号。默认建议从 .env 读取。
  juliang_trade_no: null

  # 可选：巨量 API 密钥。默认建议从 .env 读取。
  juliang_api_key: null

  # 可选：巨量代理账号。默认建议从 .env 读取。
  juliang_proxy_username: null

  # 可选：巨量代理密码。默认建议从 .env 读取。
  juliang_proxy_password: null

  # 巨量 API 根地址。
  juliang_api_base: http://v2.api.juliangip.com

  # 代理类型：1=HTTP(S)，2=SOCKS。
  juliang_proxy_type: 1

  # 距离租约到期多少秒时提前刷新代理。
  juliang_lease_refresh_margin_seconds: 1

  # 查询不到剩余时长时使用的保守默认值。
  juliang_default_lease_seconds: 30

  # 下载线程数。0 表示自动：
  # - 开启巨量代理时，默认启用“单代理提取后并发复用”
  # - 不开代理时，默认退回保守单线程
  max_workers: 0

  # 本机线程上限。巨量单代理并发复用时，自动模式最多放大到这里。
  host_max_workers: 4

  # 单请求失败后的额外重试次数。
  max_retries: 2

  # 单请求超时时间，单位秒。
  timeout: 10.0

  # 每次 HTTP 请求之间的最小间隔秒数。
  # 巨量单代理模式默认不额外串行限速，尽量把 30-60s 窗口用满。
  request_interval: 0.0

  # 额外随机等待，降低固定节奏访问风险。
  request_jitter: 0.0

  # 请求失败后的基础退避秒数。
  retry_sleep: 1.5

  # daily 增量更新时，会从当前最新日期向前回退这么多天重新刷新。
  refresh_lookback_days: 5

  # 是否打乱股票顺序下载，避免总是按固定顺序访问。
  shuffle_symbols: true

  # 调试用。只处理前 N 只股票。
  limit: null

  # 股票列表文件路径。可以是 txt/csv/json。
  # 若为 null，则使用脚本内部默认静态股票池，或 extra_symbols。
  symbols_file: null

  # 额外指定的股票列表，例如 ["000001.SZ", "600519.SH"]。
  extra_symbols: []

  # 可选的 jsonl 报告文件。每只股票一行结果，最适合排查被拒绝和空返回。
  # 默认写入 logs 目录，便于和 download.log 一起排查。
  report_file: artifacts/logs/download_report.jsonl

data:
  # 当前默认主线固定为 2026-03-28 hybrid rollover：
  # lc96 + exec_fillable_rank_neg1 + hybrid Top5 rollover
  # + train-only abs(target)<=10% + full5y + deployment epoch=4
  cache_version: mainline_20260328_lc96_exec_fillable_rank_neg1_hybrid_rollover_top5_full5y_ep4

  # 至少上市多少个交易日后，该股票样本才进入训练。
  min_listed_days: 120

  # 某天横截面至少要有多少只股票，才保留这一天。
  min_daily_universe: 100

  # 目标收益裁剪区间。过大值会被截断，减少极端样本影响。
  target_clip:
    - -0.25
    - 0.25

  # Walk-forward 切分参数。默认 5y train + 1y valid + 1y holdout。
  train_days: 1260
  valid_days: 252
  holdout_days: 252
  step_days: 252

  # 是否滚动训练窗。true 表示用最近 train_days；false 表示从头累积。
  rolling_train: true

  # 原始特征截断范围，避免极值污染。
  feature_clip: 20.0

  # 横截面标准化后再截断的范围。
  normalized_clip: 5.0

  # 固定特征工程窗口。
  ret_windows: [2, 3, 5, 10, 20, 60]
  ma_windows: [5, 10, 20, 60]
  vol_windows: [5, 10, 20, 60]
  flow_windows: [5, 20, 60]

  # 训练时的前排监督桶参数。最终评估仍然是 top1。
  portfolio_top_fraction: 0.005
  portfolio_min_k: 4
  portfolio_max_k: 12
  portfolio_rank_decay: 1.0

  # 最终评估 top_k。当前固定为 1。
  eval_top_k: 1

  # robust_score 中的回撤惩罚权重。
  robust_drawdown_weight: 0.01

  # selection_score 中 alpha 和 hit 的辅助权重。
  selection_alpha_weight: 0.25
  selection_hit_weight: 0.05

  # 标签定义：
  # target_t = open[t + exit_offset_days] / open[t + entry_offset_days] - 1
  entry_offset_days: 1
  exit_offset_days: 2

model:
  # 主干隐藏层。
  hidden_dims: [384, 192, 96]

  # dropout 比例。
  dropout: 0.2

  # 激活函数。支持 gelu/relu/silu/tanh。
  activation: gelu

  # 是否启用 LayerNorm。
  use_layernorm: false

  # lc96 member override: 每个 stage 后的残差块数。
  num_residual_blocks: 2

  # 线性 IC 头与非线性头的混合权重。
  linear_head_mix: 0.6

  # 是否冻结线性 IC 头。
  freeze_linear_head: true

  # lc96 champion shortlist rerank 参数。
  shortlist_size: 96
  secondary_shortlist_size: 0
  secondary_shortlist_source: off
  rerank_dim: 96
  rerank_blocks: 2
  rerank_heads: 8
  rerank_mix: 0.25
  shortlist_target_blend: 0.75

training:
  # Champion 成员配置标识。这里不是实验池，而是固定落地版本。
  member_config: lc96

  # 时间窗口模式：5y rolling train window。
  temporal_mode: full5y

  # 训练目标变换：
  # 先判断 t+1 开盘是否已经涨停、无法买入。
  # 可买入样本按当日截面收益映射到 [-1, 1] 的 centered rank；
  # 不可买入样本统一压到 -1，避免模型把“开盘已买不进”的名字学成正样本。
  # 只影响训练损失，不改变真实回测收益定义。
  target_transform: exec_fillable_rank_neg1

  # 训练样本过滤：
  # 若原始 raw target 的绝对值超过 10%，该样本仅在训练阶段被剔除。
  # 推理、验证和 holdout 不做这层过滤。
  train_target_abs_cap: 0.10

  # 线性 IC 头计算也使用同样的 train-only cap。
  train_target_cap_applies_to_linear_head: true

  # 随机种子。
  seed: 42

  # 最大 epoch 数。
  epochs: 18

  # 最终 deployment 模型回训的 epoch 数。
  deployment_epochs: 4

  # 每个 batch 由多少个交易日组成。
  batch_days: 20

  # AdamW 参数。
  learning_rate: 0.0005
  weight_decay: 0.0005

  # 标签平滑强度。
  label_smoothing: 0.02

  # 梯度裁剪阈值。
  grad_clip: 1.0

  # 早停耐心值。
  early_stopping_patience: 4

  # 前排正样本比例。
  positive_fraction: 0.08

  # lc96 champion：每天抽多少组 pairwise 排序样本。
  pair_samples_per_day: 96

  # lc96 member override：pairwise 更关注前排样本的比例。
  pair_focus_fraction: 0.33

  # listwise 监督与扩展目标的混合权重。
  listwise_target_blend: 0.9

  # lc96 champion：前排监督桶的扩展尺度。
  top_bucket_expansion_scale: 10.0

  # lc96 member override 各损失项权重。
  listwise_loss_weight: 0.51
  pairwise_loss_weight: 0.19
  huber_loss_weight: 0.14
  binary_loss_weight: 0.05
  winner_loss_weight: 0.11
  rerank_listwise_loss_weight: 0.06

  # 汇总 research_score 时，最近 holdout 取多少个 fold。
  recent_holdout_folds: 5

  # reference 聚合口径：
  # 最近 recent_holdout_folds 个 holdout 会在 merge 时按这个权重重复采样。
  recent_holdout_weight: 1.75

  # research_score 的加权组成，和原研究脚本保持一致。
  research_holdout_weight: 0.35
  research_recent_weight: 0.45
  research_valid_weight: 0.2

inference:
  # 实际选股数量。当前部署口径默认是 1。
  top_k: 1

  # 每次归档保存多少个候选。
  archive_top_n: 10

  # 验证与网站回填时，若 Top1 按 hybrid 规则买不进，则最多在前多少名里顺延。
  # 当前默认主线就是 Top5 顺延。
  execution_fallback_top_k: 5

  # 验证/顺延时采用哪一种“开盘已买不进”定义：
  # 当前实施仓主线固定使用 hybrid：exact + hfq 一字板补偿。
  execution_block_mode: hybrid

  # 预测方案名称，会写入归档文件。
  prediction_name: mainline_20260328_lc96_exec_fillable_rank_neg1_hybrid_rollover_top5_full5y_ep4
